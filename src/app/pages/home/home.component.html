<app-navbar></app-navbar>

<div class="container my-5">
  <h1 class="text-center mb-4">Propiedades disponibles</h1>

  <div class="row">
    <!-- Tarjeta de propiedad -->
    <div class="col-md-4 mb-4" *ngFor="let property of properties">
      <div class="card h-100 shadow-sm">
        <img src="{{ property.image }}" class="card-img-top" alt="Imagen propiedad">
        <div class="card-body">
          <h5 class="card-title">{{ property.title }}</h5>
          <p class="card-text text-muted">{{ property.address }}</p>
          <p class="card-text fw-bold text-success">${{ property.price | number }}</p>
          <p class="card-text">{{ property.description }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
